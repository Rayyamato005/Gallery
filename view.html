<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem ảnh</title>
    <link rel="icon" type="image/png" href="logo.png">

    <!-- DÙNG LẠI CSS GỐC -->
    <link rel="stylesheet" href="style.css">

    <!-- CSS RIÊNG CHO VIEW -->
    <link rel="stylesheet" href="view.css">
</head>

<body>

    <!-- HEADER (GIỮ NGUYÊN 100%) -->
    <div class="header">
        <div class="header-left">
            <a href="index.html"><img src="logo.png" class="logo"></a>
        </div>

        <div class="header-right">
            <button class="menu-toggle">☰</button>

            <div class="desktop-menu">
                <a href="hide.html" class="nav-btn hide-btn">Ẩn</a>

                <div class="dropdown">
                    <button class="nav-btn">Xem ▾</button>
                    <div class="dropdown-menu">
                        <a href="image.html">📷 Ảnh</a>
                        <a href="video.html">🎬 Video</a>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="nav-btn">Đóng góp ▾</button>
                    <div class="dropdown-menu">
                        <a href="upload.html">📷 Upload ảnh</a>
                        <a href="video-upload.html">🎬 Upload video</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-menu">
        <a href="image.html">📷 Ảnh</a>
        <a href="video.html">🎬 Video</a>
        <a href="upload.html">📷 Upload ảnh</a>
        <a href="video-upload.html">🎬 Upload video</a>
        <a href="hide.html">🕶 Ẩn</a>
    </div>

    <!-- VIEW ẢNH -->
    <div class="view-page">
        <img id="viewImg" style="display:none;">
        <video id="viewVideo" style="display:none;" controls autoplay loop playsinline
            controlsList="nodownload noplaybackrate noremoteplayback"></video>
    </div>
    <div class="like-box">
        <button id="likeBtn">❤️</button>
        <span id="likeCount">0</span>
    </div>
    

    <!-- RELATED -->
    <div id="related" class="related"></div>

    <div id="toast">Bạn đã ❤️ rồi</div>

    <!-- JS VIEW -->
    <script src="view.js"></script>

    <!-- SCRIPT HEADER (GIỮ NGUYÊN) -->
    <script>
        document.querySelectorAll(".nav-btn").forEach(btn => {
            btn.addEventListener("click", function (e) {
                e.stopPropagation();

                const dropdown = this.parentElement;

                document.querySelectorAll(".dropdown").forEach(d => {
                    if (d !== dropdown) d.classList.remove("active");
                });

                dropdown.classList.toggle("active");
            });
        });

        document.addEventListener("click", () => {
            document.querySelectorAll(".dropdown").forEach(d => {
                d.classList.remove("active");
            });
        });
    </script>

    <script>
        const menuToggle = document.querySelector(".menu-toggle");
        const mobileMenu = document.querySelector(".mobile-menu");

        menuToggle.addEventListener("click", (e) => {
            e.stopPropagation();
            mobileMenu.classList.toggle("active");
        });

        document.addEventListener("click", () => {
            mobileMenu.classList.remove("active");
        });
    </script>

</body>

</html>
